name: Build Web (pygbag)

on:
  workflow_dispatch:          # manual trigger
  push:
    branches: [main, master]
    paths:
      - 'web_main.py'
      - 'web/**'
      - 'aquarium.py'
      - 'src/**'
      - 'assets/**'
      - '.github/workflows/build-web.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build with pygbag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git describe --tags resolves correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-web.txt Pillow

      - name: Convert MP3 → OGG for web (pygbag does not allow MP3)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends ffmpeg
          for f in assets/audio/*.mp3; do
            ffmpeg -i "$f" "${f%.mp3}.ogg" -y -loglevel error
            rm "$f"
          done
          # Patch .mp3 extension references in Python source to .ogg
          find src -name "*.py" -exec sed -i 's/\.mp3"/\.ogg"/g' {} +
          find . -maxdepth 1 -name "*.py" -exec sed -i 's/\.mp3"/\.ogg"/g' {} +

      - name: Build
        # pygbag writes the finished site into build/web/
        run: python -m pygbag --build --app_name "Aquarium 98" web_main.py

      - name: Fix BrowserFS (bundle locally; pygbag CDN is missing this file)
        run: |
          # pygbag 0.9.3's generated index.html contains a <script> tag pointing to
          # https://pygame-web.github.io/cdn/0.9.3//browserfs.min.js (note double
          # slash AND the file is absent from that CDN), which triggers
          # ERR_BLOCKED_BY_ORB in Chrome and hangs the loading screen forever.
          # Fix: download BrowserFS 1.4.3 from jsDelivr and serve it locally.
          # Running BEFORE pwa_inject.py so the SW pre-caches browserfs.min.js too.
          curl -sSfL \
            "https://cdn.jsdelivr.net/npm/browserfs@1.4.3/dist/browserfs.min.js" \
            -o build/web/browserfs.min.js
          # Replace the broken CDN URL with the local copy.
          sed -i \
            's|src="https://pygame-web.github.io/cdn/[^"]*browserfs\.min\.js"|src="./browserfs.min.js"|g' \
            build/web/index.html
          echo "BrowserFS fix applied:"
          grep -n "browserfs" build/web/index.html

      - name: Inject PWA (manifest + service worker + icons)
        run: |
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          python web/pwa_inject.py --version "$VERSION"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
