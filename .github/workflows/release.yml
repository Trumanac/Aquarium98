name: Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically when a v* tag is pushed (e.g. git push origin v1.2),
# OR manually via GitHub Actions UI.
# Smoke-tests on all three platforms, builds a source zip, and publishes a
# GitHub Release with SHA-256 checksum.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0) — no leading v"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── 0. Compute version string ───────────────────────────────────────────────
  setup:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.ver.outputs.version }}
      tag:        ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - name: Compute version / tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            PRERELEASE="false"
          else
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
            PRERELEASE="${{ inputs.prerelease }}"
          fi
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"               >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION  tag=$TAG  prerelease=$PRERELEASE"

  # ── 1. Smoke-test on every supported OS ────────────────────────────────────
  smoke-test:
    name: Smoke test (${{ matrix.os }})
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev xvfb \
            libappindicator3-1 gir1.2-appindicator3-0.1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (all .py files)
        shell: python
        run: |
          import ast, pathlib, sys
          errors = []
          for p in pathlib.Path(".").rglob("*.py"):
            if any(part in p.parts for part in [".venv", "venv", "build", "dist"]):
              continue
            try:
              ast.parse(p.read_text(encoding="utf-8"))
            except SyntaxError as e:
              errors.append(f"{p}: {e}")
          if errors:
            print("\n".join(errors)); sys.exit(1)
          print("All Python files parse cleanly.")

      - name: Import check
        run: python -c "import src.config; import src.renderer; import src.simulation.fish; print('imports OK')"

      - name: Config round-trip check
        run: |
          python -c "
          import src.config as c
          d = c.load()
          assert 'persist_state' in d
          assert 'night_cycle' in d
          print('config round-trip OK')
          "

  # ── 2. Build release zip (Linux only — source is cross-platform) ───────────
  build:
    name: Build release zip
    needs: [setup, smoke-test]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build zip
        run: python build.py --version ${{ env.VERSION }}

      - name: Generate SHA-256 checksum
        run: |
          cd dist
          sha256sum "Aquarium98-v${{ env.VERSION }}.zip" \
            > "Aquarium98-v${{ env.VERSION }}.zip.sha256"
          echo "── Checksum ──"
          cat "Aquarium98-v${{ env.VERSION }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: |
            dist/Aquarium98-v${{ env.VERSION }}.zip
            dist/Aquarium98-v${{ env.VERSION }}.zip.sha256
          retention-days: 7

  # ── 3. Publish GitHub Release ──────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [setup, build]
    runs-on: ubuntu-latest
    env:
      VERSION:    ${{ needs.setup.outputs.version }}
      TAG:        ${{ needs.setup.outputs.tag }}
      PRERELEASE: ${{ needs.setup.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-zip
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ env.TAG }}
          name:                   "Aquarium 98 ${{ env.TAG }}"
          prerelease:             ${{ env.PRERELEASE }}
          generate_release_notes: true
          body: |
            ## Installation

            Download `Aquarium98-v${{ env.VERSION }}.zip`, unzip, and run:

            | Platform | Command |
            |----------|---------|
            | Windows  | Double-click `run.bat` |
            | macOS    | Double-click `run.command` (or `./run.sh`) |
            | Linux    | `./run.sh` |

            No Python installation required — the launcher creates an isolated
            virtual environment automatically on first run.

            ### macOS (Unsigned Release) Quick Setup

            If macOS blocks launch because the app is unsigned, open Terminal and run:

            ```bash
            # Change this path if you unzipped somewhere else
            cd /Applications/Aquarium98
            chmod +x run.command run.sh
            xattr -dr com.apple.quarantine .
            ./run.command
            ```

            If launch is still blocked, go to **System Settings → Privacy & Security**
            and click **Open Anyway**, then launch again.

            Verify your download with the `.sha256` checksum file.

            **Requirements (source only):** Python 3.9+
          files: |
            dist/Aquarium98-v${{ env.VERSION }}.zip
            dist/Aquarium98-v${{ env.VERSION }}.zip.sha256